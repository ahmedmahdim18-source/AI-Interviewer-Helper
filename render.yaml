services:
  - type: web
    name: interview-prep-backend
    runtime: python
    buildCommand: "cd Backend && pip install -r requirements.txt"
    startCommand: "cd Backend && python app.py"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,http://localhost:5174,https://ai-interviewer-helper-l9fx.vercel.app"
